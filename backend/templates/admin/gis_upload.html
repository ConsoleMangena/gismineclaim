{% extends "admin/base_site.html" %}
{% load i18n admin_urls static admin_modify %}

{% block content %}
<div id="content-main">
  <form enctype="multipart/form-data" method="post" id="gis_form">
    {% csrf_token %}
    <div>
      <fieldset class="module aligned">
        {% for field in form %}
          <div class="form-row">
            {{ field.errors }}
            {{ field.label_tag }} {{ field }}
            {% if field.help_text %}<p class="help">{{ field.help_text|safe }}</p>{% endif %}
          </div>
        {% endfor %}
      </fieldset>
      <div class="submit-row">
        <input type="submit" value="Upload" class="default" name="_save">
      </div>
    </div>
  </form>
</div>
{% endblock %}
